  inviteTime: 10,

  pollTimer: null,

// ── helpers ──
function fsKey(name) {
  return 'infernum_profile_' + (name||'').toLowerCase().trim();
}
function fsGet(name) {
  try { var d = localStorage.getItem(fsKey(name)); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}
function fsSave(p) {
  if (!p || !p.name) return;
  try { localStorage.setItem(fsKey(p.name), JSON.stringify(p)); } catch(e) {}
}
function fsMe() {
  // Читаем свежую копию из localStorage каждый раз
  if (typeof currentProfile === 'undefined' || !currentProfile) return null;
  var fresh = fsGet(currentProfile.name);
  if (fresh) {
    // синхронизируем memory-объект
    currentProfile.friends       = fresh.friends || [];
    currentProfile.friendRequests= fresh.friendRequests || [];
    currentProfile.sentRequests  = fresh.sentRequests || [];
    currentProfile.gameInvites   = fresh.gameInvites || [];
    currentProfile.sentInvites   = fresh.sentInvites || [];
  }
  return currentProfile;
}
function fsToast(msg) {
  if (typeof toast === 'function') toast(msg);
}
function fsEl(id) { return document.getElementById(id); }

  var dclose = fsEl('fs-dh-close');
  if (toggle) toggle.addEventListener('click', function(e) { e.stopPropagation(); toggleDrawer(); });
  if (dclose) dclose.addEventListener('click', toggleDrawer);

  // Tabs
  ['friends','requests','invites'].forEach(function(t) {
    var el = fsEl('fst-' + t);
    if (el) el.addEventListener('click', function() { switchTab(t); });
  });

  // Add friend
  var addBtn = fsEl('fs-add-btn');
  var addInp = fsEl('fs-add-inp');
  if (addBtn) addBtn.addEventListener('click', sendFriendRequest);
  if (addInp) addInp.addEventListener('keydown', function(e) { if (e.key==='Enter') sendFriendRequest(); });

  // Invite modal — side/time selectors
  fsEl('fs-sw') && fsEl('fs-sw').addEventListener('click', function() { setSide('white'); });
  fsEl('fs-sb') && fsEl('fs-sb').addEventListener('click', function() { setSide('black'); });
  fsEl('fs-sr') && fsEl('fs-sr').addEventListener('click', function() { setSide('random'); });

  [1,3,5,10,15,30,60,0].forEach(function(t) {
    var el = fsEl('fst-' + t);
    if (el) el.addEventListener('click', function() { setTime(t); });
  });

  var sendBtn = fsEl('fs-send-btn');
  if (sendBtn) sendBtn.addEventListener('click', sendGameInvite);

  var closeBtn = fsEl('fs-close-btn');
  if (closeBtn) closeBtn.addEventListener('click', closeInvModal);

  var cancelInv = fsEl('fs-cancel-inv');
  if (cancelInv) cancelInv.addEventListener('click', cancelInvite);

  // Close modal on overlay click
  var modal = fsEl('fs-inv-modal');
  if (modal) modal.addEventListener('click', function(e) { if (e.target === modal) closeInvModal(); });

  // Close drawer on outside click
  document.addEventListener('click', function(e) {
    var drawer = fsEl('fs-drawer');
    var toggle2 = fsEl('fs-toggle');
    var modal2 = fsEl('fs-inv-modal');
    if (!FS.drawerOpen) return;
    if (modal2 && modal2.classList.contains('open')) return;
    if (drawer && !drawer.contains(e.target) && toggle2 && !toggle2.contains(e.target)) {
      FS.drawerOpen = false;
      drawer.classList.remove('open');
    }
  });
}

// ══════════════════════════════════════════════
//  DRAWER
// ══════════════════════════════════════════════
function toggleDrawer() {
  FS.drawerOpen = !FS.drawerOpen;
  var d = fsEl('fs-drawer');
  if (d) d.classList.toggle('open', FS.drawerOpen);
  if (FS.drawerOpen) renderTab(FS.activeTab);
}

function switchTab(tab) {
  FS.activeTab = tab;
  ['friends','requests','invites'].forEach(function(t) {
    var te = fsEl('fst-' + t);
    var pe = fsEl('fsp-' + t);
    if (te) te.classList.toggle('on', t === tab);
    if (pe) pe.classList.toggle('on', t === tab);
  });
  renderTab(tab);
}

function renderTab(tab) {
  if (tab === 'friends')  renderFriends();
  if (tab === 'requests') renderRequests();
  if (tab === 'invites')  renderInvites();
  updateBadges();
}

// ══════════════════════════════════════════════
//  RENDER FRIENDS
// ══════════════════════════════════════════════
function renderFriends() {
  var me = fsMe();
  var c = fsEl('fs-friends-list');
  if (!c) return;
  if (!me) { c.innerHTML = '<div class="fs-empty">ВОЙДИТЕ В АККАУНТ</div>'; return; }
  var friends = me.friends || [];
  if (!friends.length) { c.innerHTML = '<div class="fs-empty">НЕТ ДРУЗЕЙ<br>ДОБАВЬТЕ ПЕРВОГО</div>'; return; }
  c.innerHTML = '';
  friends.forEach(function(name) {
    var fp = fsGet(name) || {};
    var el = document.createElement('div');
    el.className = 'fc';
    el.innerHTML = ''
      + '<div class="fc-top">'
      +   '<div class="fc-av">♟</div>'
      +   '<div class="fc-inf">'
      +     '<div class="fc-nm">' + esc(name) + '</div>'
      +     '<div class="fc-st">' + (fp.wins||0) + 'В / ' + (fp.losses||0) + 'П · ' + (fp.total||0) + ' ПАР.</div>'
      +   '</div>'
      + '</div>'
      + '<div class="fc-acts">'
      +   '<button class="fc-btn pr fs-invite-btn" data-name="' + esc(name) + '">⚔ ВЫЗВАТЬ</button>'
      +   '<button class="fc-btn dr fs-remove-btn" data-name="' + esc(name) + '">✕ УДАЛИТЬ</button>'
      + '</div>';
    c.appendChild(el);
  });
  // Delegate buttons
  c.querySelectorAll('.fs-invite-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { openInvModal(this.dataset.name); });
  });
  c.querySelectorAll('.fs-remove-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { removeFriend(this.dataset.name); });
  });
}

// ══════════════════════════════════════════════
//  RENDER REQUESTS
// ══════════════════════════════════════════════
function renderRequests() {
  var me = fsMe();
  var cin = fsEl('fs-req-in');
  var cout = fsEl('fs-req-out');
  if (!cin || !cout || !me) return;

  var inc = me.friendRequests || [];
  cin.innerHTML = '';
  if (!inc.length) {
    cin.innerHTML = '<div class="fs-empty" style="padding:16px 0">НЕТ ЗАПРОСОВ</div>';
  } else {
    inc.forEach(function(name) {
      var el = document.createElement('div');
      el.className = 'pc';
      el.innerHTML = ''
        + '<div><div class="pc-nm">' + esc(name) + '</div><div class="pc-lb">ХОЧЕТ ДОБАВИТЬ ВАС</div></div>'
        + '<div class="pc-btns">'
        +   '<button class="pc-ok fs-acc-req" data-name="' + esc(name) + '">✓</button>'
        +   '<button class="pc-no fs-dec-req" data-name="' + esc(name) + '">✕</button>'
        + '</div>';
      cin.appendChild(el);
    });
    cin.querySelectorAll('.fs-acc-req').forEach(function(b) { b.addEventListener('click', function() { acceptReq(this.dataset.name); }); });
    cin.querySelectorAll('.fs-dec-req').forEach(function(b) { b.addEventListener('click', function() { declineReq(this.dataset.name); }); });
  }

  var out = me.sentRequests || [];
  cout.innerHTML = '';
  if (!out.length) {
    cout.innerHTML = '<div class="fs-empty" style="padding:16px 0">НЕТ ИСХОДЯЩИХ</div>';
  } else {
    out.forEach(function(name) {
      var el = document.createElement('div');
      el.className = 'pc';
      el.style.opacity = '.6';
      el.innerHTML = ''
        + '<div><div class="pc-nm">' + esc(name) + '</div><div class="pc-lb">ОЖИДАЕТ ОТВЕТА</div></div>'
        + '<button class="pc-no fs-cancel-req" data-name="' + esc(name) + '">ОТОЗВАТЬ</button>';
      cout.appendChild(el);
    });
    cout.querySelectorAll('.fs-cancel-req').forEach(function(b) { b.addEventListener('click', function() { cancelReq(this.dataset.name); }); });
  }
}

// ══════════════════════════════════════════════
//  RENDER INVITES
// ══════════════════════════════════════════════
function renderInvites() {
  var me = fsMe();
  var c = fsEl('fs-inv-list');
  if (!c || !me) return;
  var now = Date.now();
  var invites = (me.gameInvites || []).filter(function(i) { return now - i.ts < 300000; });
  if (!invites.length) { c.innerHTML = '<div class="fs-empty">НЕТ ВЫЗОВОВ</div>'; return; }
  c.innerHTML = '';
  invites.forEach(function(inv) {
    var sides = {white:'♔ БЕЛЫЕ',black:'♟ ЧЁРНЫЕ',random:'⚄ СЛУЧАЙНО'};
    var oppSide = inv.side === 'white' ? '♟ ЧЁРНЫЕ' : inv.side === 'black' ? '♔ БЕЛЫЕ' : '⚄ СЛУЧАЙНО';
    var el = document.createElement('div');
    el.className = 'ic';
    el.innerHTML = ''
      + '<div class="ic-from">⚔ ' + esc(inv.from||'') + ' ВЫЗЫВАЕТ ВАС</div>'
      + '<div class="ic-row">'
      +   '<span class="ic-badge">' + (inv.time||10) + ' МИН</span>'
      +   '<span class="ic-badge">ВЫ: ' + oppSide + '</span>'
      + '</div>'
      + '<div class="ic-acts">'
      +   '<button class="ic-acc fs-acc-inv" data-inv=\'' + safeJson(inv) + '\'>✓ ПРИНЯТЬ</button>'
      +   '<button class="ic-dec fs-dec-inv" data-id="' + inv.id + '" data-from="' + esc(inv.from||'') + '">ОТКАЗАТЬ</button>'
      + '</div>';
    c.appendChild(el);
  });
  c.querySelectorAll('.fs-acc-inv').forEach(function(b) {
    b.addEventListener('click', function() {
      try { acceptInvite(JSON.parse(this.dataset.inv)); } catch(e) {}
    });
  });
  c.querySelectorAll('.fs-dec-inv').forEach(function(b) {
    b.addEventListener('click', function() { declineInvite(this.dataset.id, this.dataset.from); });
  });
}

// ══════════════════════════════════════════════
//  BADGES
// ══════════════════════════════════════════════
function updateBadges() {
  var me = fsMe();
  var req = me ? ((me.friendRequests||[]).length) : 0;
  var inv = me ? ((me.gameInvites||[]).filter(function(i){return Date.now()-i.ts<300000;}).length) : 0;
  var rb = fsEl('fs-req-b'); if (rb) { rb.textContent = req; rb.classList.toggle('on', req > 0); }
  var ib = fsEl('fs-inv-b'); if (ib) { ib.textContent = inv; ib.classList.toggle('on', inv > 0); }
  var nd = fsEl('fs-notif'); if (nd) nd.classList.toggle('on', req + inv > 0);
}

// ══════════════════════════════════════════════
//  FRIEND ACTIONS
// ══════════════════════════════════════════════
function sendFriendRequest() {
  var me = fsMe();
  if (!me) { fsToast('ВОЙДИТЕ В АККАУНТ'); return; }
  var inp = fsEl('fs-add-inp');
  var name = inp ? inp.value.trim() : '';
  if (!name) { fsToast('ВВЕДИТЕ ИМЯ'); return; }
  if (name.toLowerCase() === me.name.toLowerCase()) { fsToast('ЭТО ВЫ'); return; }
  var target = fsGet(name);
  if (!target) { fsToast('ИГРОК НЕ НАЙДЕН'); return; }
  if ((me.friends||[]).some(function(f){return f.toLowerCase()===name.toLowerCase();})) { fsToast('УЖЕ В ДРУЗЬЯХ'); return; }
  if ((me.sentRequests||[]).some(function(r){return r.toLowerCase()===name.toLowerCase();})) { fsToast('ЗАПРОС УЖЕ ОТПРАВЛЕН'); return; }
  if (!me.sentRequests) me.sentRequests = [];
  me.sentRequests.push(target.name);
  fsSave(me);
  if (!target.friendRequests) target.friendRequests = [];
  target.friendRequests.push(me.name);
  fsSave(target);
  if (inp) inp.value = '';
  fsToast('✦ ЗАПРОС ОТПРАВЛЕН: ' + target.name.toUpperCase());
  renderFriends();
  updateBadges();
}

function acceptReq(name) {
  var me = fsMe(); if (!me) return;
  var other = fsGet(name); if (!other) return;
  if (!me.friends) me.friends = [];
  if (!other.friends) other.friends = [];
  if (!me.friends.includes(other.name)) me.friends.push(other.name);
  if (!other.friends.includes(me.name)) other.friends.push(me.name);
  me.friendRequests = (me.friendRequests||[]).filter(function(r){return r.toLowerCase()!==name.toLowerCase();});
  other.sentRequests = (other.sentRequests||[]).filter(function(r){return r.toLowerCase()!==me.name.toLowerCase();});
  fsSave(me); fsSave(other);
  fsToast('✦ ' + other.name.toUpperCase() + ' ТЕПЕРЬ ВАШ ДРУГ!');
  renderRequests(); updateBadges();
}

function declineReq(name) {
  var me = fsMe(); if (!me) return;
  me.friendRequests = (me.friendRequests||[]).filter(function(r){return r.toLowerCase()!==name.toLowerCase();});
  var other = fsGet(name);
  if (other) { other.sentRequests = (other.sentRequests||[]).filter(function(r){return r.toLowerCase()!==me.name.toLowerCase();}); fsSave(other); }
  fsSave(me); renderRequests(); updateBadges();
}

function cancelReq(name) {
  var me = fsMe(); if (!me) return;
  me.sentRequests = (me.sentRequests||[]).filter(function(r){return r.toLowerCase()!==name.toLowerCase();});
  var other = fsGet(name);
  if (other) { other.friendRequests = (other.friendRequests||[]).filter(function(r){return r.toLowerCase()!==me.name.toLowerCase();}); fsSave(other); }
  fsSave(me); renderRequests();
}

function removeFriend(name) {
  var me = fsMe(); if (!me) return;
  me.friends = (me.friends||[]).filter(function(f){return f.toLowerCase()!==name.toLowerCase();});
  var other = fsGet(name);
  if (other) { other.friends = (other.friends||[]).filter(function(f){return f.toLowerCase()!==me.name.toLowerCase();}); fsSave(other); }
  fsSave(me); fsToast('УДАЛЕНО ИЗ ДРУЗЕЙ'); renderFriends(); updateBadges();
}

// ══════════════════════════════════════════════
//  INVITE MODAL
// ══════════════════════════════════════════════
function openInvModal(targetName) {
  FS.inviteTarget = targetName;
  FS.inviteSide = 'white';
  FS.inviteTime = 10;
  var tn = fsEl('fs-inv-toname'); if (tn) tn.textContent = targetName.toUpperCase();
  var wt = fsEl('fs-wait-to'); if (wt) wt.textContent = targetName.toUpperCase();
  fsEl('fs-inv-form').style.display = '';
  fsEl('fs-inv-wait').style.display = 'none';
  setSide('white');
  setTime(10);
  // close drawer
  FS.drawerOpen = false;
  var d = fsEl('fs-drawer'); if (d) d.classList.remove('open');
  // open modal
  var m = fsEl('fs-inv-modal'); if (m) m.classList.add('open');
}

function closeInvModal() {
  var m = fsEl('fs-inv-modal'); if (m) m.classList.remove('open');
  stopInvPoll();
  FS.inviteTarget = null;
  FS.pendingInviteId = null;
}

function setSide(s) {
  FS.inviteSide = s;
  ['white','black','random'].forEach(function(x) {
    var map = {white:'fs-sw',black:'fs-sb',random:'fs-sr'};
    var el = fsEl(map[x]); if (el) el.classList.toggle('on', x === s);
  });
}

function setTime(t) {
  FS.inviteTime = t;
  [1,3,5,10,15,30,60,0].forEach(function(x) {
    var el = fsEl('fst-' + x); if (el) el.classList.toggle('on', x === t);
  });
  var cr = fsEl('fs-custom-row'); if (cr) cr.style.display = (t === 0) ? 'flex' : 'none';
}

function sendGameInvite() {
  var me = fsMe(); if (!me || !FS.inviteTarget) return;
  var timeVal = FS.inviteTime;
  if (timeVal === 0) {
    var cv = fsEl('fs-custom-val'); timeVal = cv ? (parseInt(cv.value)||10) : 10;
  }
  var inv = { id: Date.now() + '_' + Math.random().toString(36).substr(2,5), from: me.name, to: FS.inviteTarget, side: FS.inviteSide, time: timeVal, ts: Date.now(), status: 'pending' };
  FS.pendingInviteId = inv.id;
  var target = fsGet(FS.inviteTarget);
  if (!target) { fsToast('ИГРОК НЕ НАЙДЕН'); return; }
  if (!target.gameInvites) target.gameInvites = [];
  target.gameInvites = target.gameInvites.filter(function(i){return i.from.toLowerCase()!==me.name.toLowerCase();});
  target.gameInvites.push(inv);
  fsSave(target);
  if (!me.sentInvites) me.sentInvites = [];
  me.sentInvites = me.sentInvites.filter(function(i){return i.to.toLowerCase()!==FS.inviteTarget.toLowerCase();});
  me.sentInvites.push(inv);
  fsSave(me);
  fsEl('fs-inv-form').style.display = 'none';
  fsEl('fs-inv-wait').style.display = '';
  fsToast('⚔ ВЫЗОВ ОТПРАВЛЕН: ' + FS.inviteTarget.toUpperCase());
  startInvPoll(inv.id);
}

function cancelInvite() {
  var me = fsMe();
  if (me && FS.pendingInviteId) {
    var id = FS.pendingInviteId;
    me.sentInvites = (me.sentInvites||[]).filter(function(i){return i.id!==id;});
    fsSave(me);
    if (FS.inviteTarget) {
      var t = fsGet(FS.inviteTarget);
      if (t) { t.gameInvites = (t.gameInvites||[]).filter(function(i){return i.id!==id;}); fsSave(t); }
    }
  }
  stopInvPoll(); closeInvModal(); fsToast('ВЫЗОВ ОТОЗВАН');
}

function acceptInvite(inv) {
  var me = fsMe(); if (!me) return;
  // Mark accepted in sender's profile
  var sender = fsGet(inv.from);
  if (sender) {
    var si = (sender.sentInvites||[]).find(function(i){return i.id===inv.id;});
    if (si) { si.status = 'accepted'; fsSave(sender); }
  }
  // Remove from my invites
  me.gameInvites = (me.gameInvites||[]).filter(function(i){return i.id!==inv.id;});
  fsSave(me);
  closeDrawer(); closeInvModal();
  updateBadges();
  // Determine colors
  var mySide = inv.side === 'white' ? 'black' : inv.side === 'black' ? 'white' : (Math.random()<.5?'white':'black');
  var timeSec = (inv.time||10) * 60;
  var pW = mySide === 'white' ? me.name : inv.from;
  var pB = mySide === 'black' ? me.name : inv.from;
  fsToast('⚔ ИГРА ПРОТИВ ' + inv.from.toUpperCase() + '!');
  setTimeout(function() { launchGame(pW, pB, timeSec, mySide === 'black'); }, 400);
}

function declineInvite(id, fromName) {
  var me = fsMe(); if (!me) return;
  me.gameInvites = (me.gameInvites||[]).filter(function(i){return i.id!==id;});
  fsSave(me);
  var sender = fsGet(fromName);
  if (sender) {
    var si = (sender.sentInvites||[]).find(function(i){return i.id===id;});
    if (si) { si.status = 'declined'; fsSave(sender); }
  }
  renderInvites(); updateBadges(); fsToast('ВЫЗОВ ОТКЛОНЁН');
}

function closeDrawer() {
  FS.drawerOpen = false;
  var d = fsEl('fs-drawer'); if (d) d.classList.remove('open');
}

// ══════════════════════════════════════════════
//  LAUNCH GAME
// ══════════════════════════════════════════════
function launchGame(pW, pB, timeSec, flipped) {
  if (typeof startGame !== 'function') return;
  startGame({ pW: pW, pB: pB, flipped: !!flipped });
  // Override timers
  if (typeof G !== 'undefined') {
    G.timers = { w: timeSec, b: timeSec };
    if (typeof updateTimers === 'function') updateTimers();
  }
}

// ══════════════════════════════════════════════
//  POLLING
// ══════════════════════════════════════════════
function startInvPoll(invId) {
  stopInvPoll();
  FS.invitePollTimer = setInterval(function() {
    var me = fsMe(); if (!me) return;
    var fresh = fsGet(me.name); if (!fresh) return;
    var si = (fresh.sentInvites||[]).find(function(i){return i.id===invId;});
    if (!si) return;
    if (si.status === 'accepted') {
      stopInvPoll();
      // Update memory
      me.sentInvites = fresh.sentInvites;
      fsSave(me);
      closeInvModal();
      var mySide = si.side === 'random' ? (Math.random()<.5?'white':'black') : si.side;
      var timeSec = (si.time||10) * 60;
      var pW = mySide === 'white' ? me.name : si.to;
      var pB = mySide === 'black' ? me.name : si.to;
      fsToast('✓ ' + si.to.toUpperCase() + ' ПРИНЯЛ ВЫЗОВ!');
      setTimeout(function() { launchGame(pW, pB, timeSec, mySide === 'black'); }, 400);
    } else if (si.status === 'declined') {
      stopInvPoll();
      closeInvModal();
      fsToast('✕ ' + (si.to||'').toUpperCase() + ' ОТКЛОНИЛ ВЫЗОВ');
      me.sentInvites = (fresh.sentInvites||[]).filter(function(i){return i.id!==invId;});
      fsSave(me);
    }
  }, 2000);
}

function stopInvPoll() {
  if (FS.invitePollTimer) { clearInterval(FS.invitePollTimer); FS.invitePollTimer = null; }
}

function startGlobalPoll() {
  if (FS.pollTimer) clearInterval(FS.pollTimer);
  FS.pollTimer = setInterval(function() {
    var me = fsMe(); if (!me) return;
    var fresh = fsGet(me.name); if (!fresh) return;
    var newInvites = fresh.gameInvites || [];
    var oldCount = (me.gameInvites||[]).length;
    var newCount = newInvites.filter(function(i){return Date.now()-i.ts<300000;}).length;
    var oldReqCount = (me.friendRequests||[]).length;
    var newReqCount = (fresh.friendRequests||[]).length;
    if (newCount > oldCount) {
      var latest = newInvites[newInvites.length-1];
      fsToast('⚔ ' + (latest.from||'').toUpperCase() + ' ВЫЗЫВАЕТ НА ПАРТИЮ!');
      if (FS.drawerOpen && FS.activeTab==='invites') renderInvites();
    }
    if (newReqCount > oldReqCount) {
      var latestR = (fresh.friendRequests||[])[newReqCount-1];
      if (latestR) fsToast('✦ ' + latestR.toUpperCase() + ' ХОЧЕТ ДОБАВИТЬ ВАС');
    }
    updateBadges();
  }, 3000);
}

// ── utils ──
function esc(s) { return (s||'').replace(/[<>&"']/g, function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];}); }
function safeJson(obj) { return JSON.stringify(obj).replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  bindEvents();
  updateBadges();
  startGlobalPoll();
}

// Хук на логин — запускаем систему после входа
function hookLogin() {
  // Используем MutationObserver вместо переопределения функций
  var loginOverlay = document.getElementById('login-overlay');
  if (!loginOverlay) return;
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      if (m.type === 'attributes' && m.attributeName === 'class') {
        var target = m.target;
        // Когда overlay скрывается — пользователь залогинился
        if (!target.classList.contains('open')) {
          setTimeout(function() { updateBadges(); startGlobalPoll(); }, 600);
        }
      }
    });
  });
  observer.observe(loginOverlay, { attributes: true });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() { init(); hookLogin(); });
} else {
  init();
  hookLogin();
}

// Экспортируем нужные функции глобально для onclick в HTML
window.fsFriendsToggle = toggleDrawer;

})(); // конец IIFE
